<!-- GitHub Discussions (Enquiries) Script -->
<script>
// Cache bust: v3.0 — minimal enquiry cards, artifacts joined from _data/artifacts.yml
document.addEventListener('DOMContentLoaded', function() {
    const discussionsContainer = document.getElementById('github-discussions');
    if (!discussionsContainer) return;

    // Discussion number -> artifact, rendered from _data/artifacts.yml by Jekyll.
    const ARTIFACTS = {{ site.data.artifacts | jsonify }};

    // GitHub REST API endpoint for discussions
    const GITHUB_API_URL = 'https://api.github.com/repos/BeyondQuality/beyondquality/discussions?per_page=100';

    // Small document icon: signals the artifact is an openable resource (link).
    const ARTIFACT_ICON = '<svg class="enquiry-artifact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>';

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Render the enquiries list. Each enquiry is one discussion. If the
    // discussion produced an artifact, an extra link is shown on the card.
    function renderDiscussions(discussions) {
        if (discussions.length === 0) {
            discussionsContainer.innerHTML = '<p>No enquiries found.</p>';
            return;
        }

        const html = discussions.map(discussion => {
            const artifact = ARTIFACTS[discussion.number];
            const artifactLink = artifact
                ? `<a class="enquiry-artifact" href="${artifact.url}" title="${escapeHtml(artifact.title)}">${ARTIFACT_ICON}Artifact</a>`
                : '';

            return `
                <li class="enquiry-item">
                    <a class="enquiry-link" href="${discussion.html_url}" target="_blank" rel="noopener noreferrer">${escapeHtml(discussion.title)}</a>
                    ${artifactLink}
                </li>
            `;
        }).join('');

        discussionsContainer.innerHTML = '<ul class="enquiry-list">' + html + '</ul>';
    }

    function showError(message) {
        let errorMessage = message;
        let isRateLimit = message.includes('rate limit') || message.includes('API rate limit');

        if (isRateLimit) {
            errorMessage = "Rate limit reached. Please try again later or visit GitHub directly.";
        }

        discussionsContainer.innerHTML = `
            <div class="discussions-error">
                <p>❌ ${errorMessage}</p>
                <p><a href="https://github.com/BeyondQuality/beyondquality/discussions" target="_blank" rel="noopener noreferrer">
                    View enquiries on GitHub
                </a></p>
                ${isRateLimit ? '<p><small>Rate limit resets every hour. You can refresh the page later.</small></p>' : ''}
            </div>
        `;
    }

    function showLoading() {
        discussionsContainer.innerHTML = '<div class="discussions-loading">🔄 Loading enquiries...</div>';
    }

    async function fetchDiscussions() {
        showLoading();

        try {
            const response = await fetch(GITHUB_API_URL, {
                method: 'GET',
                headers: {
                    'Accept': 'application/vnd.github.v3+json',
                }
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const all = await response.json();

            if (Array.isArray(all) && all.length > 0) {
                // GitHub is the source of truth: only show OPEN discussions.
                // Closing a discussion (resolved/outdated/duplicate) drops it
                // from the list. The REST list endpoint can't filter by state,
                // so we filter client-side.
                const discussions = all
                    .filter(d => d.state === 'open')
                    .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
                renderDiscussions(discussions);
            } else {
                throw new Error('No discussions data found');
            }

        } catch (error) {
            console.error('Error fetching discussions:', error);
            showError(error.message);
        }
    }

    fetchDiscussions();
});
</script>
