<!-- GitHub Discussions (Enquiries) Script -->
<script>
// Cache bust: v3.0 — minimal enquiry cards, artifacts joined from _data/artifacts.yml
document.addEventListener('DOMContentLoaded', function() {
    const discussionsContainer = document.getElementById('github-discussions');
    if (!discussionsContainer) return;

    // Discussion number -> artifact, rendered from _data/artifacts.yml by Jekyll.
    const ARTIFACTS = {{ site.data.artifacts | jsonify }};

    // GitHub REST API endpoint for discussions
    const GITHUB_API_URL = 'https://api.github.com/repos/BeyondQuality/beyondquality/discussions';

    // Inline comment icon (crisp, inherits text colour, aligns to the text)
    const COMMENT_ICON = '<svg class="enquiry-comments-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>';

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Render the enquiries list. Each enquiry is one discussion. If the
    // discussion produced an artifact, an extra link is shown on the card.
    function renderDiscussions(discussions) {
        if (discussions.length === 0) {
            discussionsContainer.innerHTML = '<p>No enquiries found.</p>';
            return;
        }

        const html = discussions.map(discussion => {
            const artifact = ARTIFACTS[discussion.number];
            const artifactLink = artifact
                ? `<a class="enquiry-artifact" href="${artifact.url}" title="${escapeHtml(artifact.title)}">Artifact</a>`
                : '';

            return `
                <div class="enquiry-item">
                    <h3 class="enquiry-title">
                        <a href="${discussion.html_url}" target="_blank" rel="noopener noreferrer">${escapeHtml(discussion.title)}</a>
                    </h3>
                    <div class="enquiry-meta">
                        ${artifactLink}
                        <span class="enquiry-comments">${COMMENT_ICON}${discussion.comments || 0}</span>
                    </div>
                </div>
            `;
        }).join('');

        discussionsContainer.innerHTML = html;
    }

    function showError(message) {
        let errorMessage = message;
        let isRateLimit = message.includes('rate limit') || message.includes('API rate limit');

        if (isRateLimit) {
            errorMessage = "Rate limit reached. Please try again later or visit GitHub directly.";
        }

        discussionsContainer.innerHTML = `
            <div class="discussions-error">
                <p>❌ ${errorMessage}</p>
                <p><a href="https://github.com/BeyondQuality/beyondquality/discussions" target="_blank" rel="noopener noreferrer">
                    View enquiries on GitHub
                </a></p>
                ${isRateLimit ? '<p><small>Rate limit resets every hour. You can refresh the page later.</small></p>' : ''}
            </div>
        `;
    }

    function showLoading() {
        discussionsContainer.innerHTML = '<div class="discussions-loading">🔄 Loading enquiries...</div>';
    }

    async function fetchDiscussions() {
        showLoading();

        try {
            const response = await fetch(GITHUB_API_URL, {
                method: 'GET',
                headers: {
                    'Accept': 'application/vnd.github.v3+json',
                }
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const discussions = await response.json();

            if (Array.isArray(discussions) && discussions.length > 0) {
                discussions.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
                renderDiscussions(discussions);
            } else {
                throw new Error('No discussions data found');
            }

        } catch (error) {
            console.error('Error fetching discussions:', error);
            showError(error.message);
        }
    }

    fetchDiscussions();
});
</script>
