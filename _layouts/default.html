<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ffffff">

    <!-- Favicons -->
    <link rel="icon" type="image/jpeg" href="/bq.jpeg">
    <link rel="apple-touch-icon" href="/bq.jpeg">

    <!-- SEO: title, description, canonical, Open Graph, Twitter card, JSON-LD -->
    {% seo %}

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/custom.css?v={{ site.time | date: '%s' }}">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Navigation (sub-pages only; the homepage uses the hero as its identity) -->
    {% unless page.url == '/' %}
    <nav class="nav">
      <div class="nav-container">
        <a href="/" class="nav-brand">Beyond Quality</a>
      </div>
    </nav>
    {% endunless %}

    <!-- Main Content -->
    <main class="main-content">
      {{ content }}
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-container">
        <h2 class="footer-title">Sponsored by:</h2>
        <div class="footer-sponsors">
          <div class="sponsor"><a target="_blank" href="https://qase.io"><img src="/assets/images/qase_logo.png" alt="Qase" class="sponsor-logo"></a></div>
          <div class="sponsor regent"><a target="_blank" href="https://regent.se"><img src="/assets/images/regent_logo.png" alt="Regent AB" class="sponsor-logo"></a></div>
          <div class="sponsor testsolutions"><a target="_blank" href="https://testsolutions.de"><img src="/assets/images/testsolutions_logo.png" alt="TestSolutions" class="sponsor-logo"></a></div>
        </div>
        <div class="footer-meta">
          <a href="/coc" class="footer-link">Code of Conduct</a>
        </div>
      </div>
    </footer>
  </body>
</html>
