<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ffffff">
    
    <!-- Begin Jekyll SEO tag v2.8.0 -->
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="generator" content="Jekyll v{{ jekyll.version }}" />
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
    <meta property="og:locale" content="en_US" />
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
    <link rel="canonical" href="{{ page.url | absolute_url }}" />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />
    <meta property="og:site_name" content="{{ site.title }}" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta property="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
    <!-- End Jekyll SEO tag -->

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/custom.css?v3">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Navigation (sub-pages only; the homepage uses the hero as its identity) -->
    {% unless page.url == '/' %}
    <nav class="nav">
      <div class="nav-container">
        <a href="/" class="nav-brand">Beyond Quality</a>
      </div>
    </nav>
    {% endunless %}

    <!-- Main Content -->
    <main class="main-content">
      {{ content }}
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-container">
        <h2 class="footer-title">Sponsored by:</h2>
        <div class="footer-sponsors">
          <div class="sponsor"><a target="_blank" href="https://qase.io"><img src="/assets/images/qase_logo.png" alt="Qase" class="sponsor-logo"></a></div>
          <div class="sponsor regent"><a target="_blank" href="https://regent.se"><img src="/assets/images/regent_logo.png" alt="Regent AB" class="sponsor-logo"></a></div>
          <div class="sponsor testsolutions"><a target="_blank" href="https://testsolutions.de"><img src="/assets/images/testsolutions_logo.png" alt="TestSolutions" class="sponsor-logo"></a></div>
        </div>
        <div class="footer-meta">
          <a href="/coc" class="footer-link">Code of Conduct</a>
        </div>
      </div>
    </footer>
  </body>
</html>
