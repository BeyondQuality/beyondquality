name: Build and deploy site

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 * * * *'        # hourly backbone: reconcile enquiries with GitHub
  discussion:
    types: [created, edited, deleted, category_changed, transferred]
  workflow_dispatch:

permissions:
  contents: read
  discussions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0          # full history so bin/fetch-artifact-dates.sh can read each file's last commit
      - name: Fetch open enquiries
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash bin/fetch-enquiries.sh
      - name: Compute artifact last-updated dates
        run: bash bin/fetch-artifact-dates.sh
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'   # build-only on PRs; never deploy from a PR
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
